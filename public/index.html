<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Auth 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass w-full max-auto max-w-md p-8 rounded-3xl shadow-2xl text-white">
        <!-- Tab Toggle -->
        <div class="flex justify-around mb-8 border-b border-white/20 pb-2">
            <button onclick="toggleForm('login')" id="login-tab" class="font-bold border-b-2 border-white pb-2 transition-all">Login</button>
            <button onclick="toggleForm('signup')" id="signup-tab" class="font-bold opacity-50 hover:opacity-100 transition-all">Sign Up</button>
        </div>

        <!-- Form Message -->
        <div id="msg" class="text-sm mb-4 text-center hidden p-2 rounded bg-white/10"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">
            <h2 class="text-3xl font-extrabold tracking-tight">Welcome Back</h2>
            <input type="email" id="l-email" placeholder="Email" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-white/60">
            <input type="password" id="l-pass" placeholder="Password" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-white/60">
            <button type="submit" class="w-full py-4 bg-white text-purple-700 font-bold rounded-xl hover:bg-purple-100 transition-all active:scale-95 shadow-lg">Enter Dashboard</button>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signup-form" class="space-y-6 hidden">
            <h2 class="text-3xl font-extrabold tracking-tight">Create Account</h2>
            <input type="text" id="s-name" placeholder="Full Name" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-white/60">
            <input type="email" id="s-email" placeholder="Email" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-white/60">
            <input type="password" id="s-pass" placeholder="Password" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-white/60">
            <button type="submit" class="w-full py-4 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition-all active:scale-95 shadow-lg border border-white/10">Register Now</button>
        </form>
    </div>

    <script>
        const msgDiv = document.getElementById('msg');
        
        function toggleForm(type) {
            const isLogin = type === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('signup-form').classList.toggle('hidden', isLogin);
            document.getElementById('login-tab').className = isLogin ? 'font-bold border-b-2 border-white pb-2' : 'font-bold opacity-50';
            document.getElementById('signup-tab').className = !isLogin ? 'font-bold border-b-2 border-white pb-2' : 'font-bold opacity-50';
            msgDiv.classList.add('hidden');
        }

        async function handleAuth(url, data) {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            msgDiv.innerText = result.error || result.message;
            msgDiv.classList.remove('hidden');
            if (res.ok && url.includes('signup')) toggleForm('login');
        }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            handleAuth('/api/login', { email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value });
        };

        document.getElementById('signup-form').onsubmit = (e) => {
            e.preventDefault();
            handleAuth('/api/signup', { name: document.getElementById('s-name').value, email: document.getElementById('s-email').value, password: document.getElementById('s-pass').value });
        };
    </script>
</body>
</html>
